<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess the Headlines — India Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #030712; margin: 0; }
    .fade-in  { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }
    @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.7);} }
    .pop-in { animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes popIn { from{opacity:0;transform:scale(.85);} to{opacity:1;transform:scale(1);} }
  </style>
</head>
<body class="dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ─────────────────────────────────────────────────────────────────────────
    // QUESTION DATA
    // ─────────────────────────────────────────────────────────────────────────
    const ALL_QUESTIONS = [
      // ── ROUND 1 ──────────────────────────────────────────────────────────
      {
        id: 1, round: 1,
        options: [
          { letter:"A", text:"Elephant escapes from a wedding in Jaipur and blocks a major highway for three hours" },
          { letter:"B", text:"Monkey hijacks a bus in Bareilly, crashing it into two others before the driver can stop it" },
          { letter:"C", text:"Gang of monkeys storms a Delhi government office and makes off with all the paperwork" },
        ],
        answer: "B",
        trivia: "A monkey in Bareilly climbed into an unattended bus at a station, released the handbrake and rammed it into two other buses. A transport spokesperson said monkeys had become a \"regular menace\" at bus stations, frequently tampering with vehicles under repair. (Ranker / Indian media)",
      },
      {
        id: 2, round: 1,
        options: [
          { letter:"A", text:"Goat named Babli arrested alongside her owner for eating a local judge's garden" },
          { letter:"B", text:"Cow wanders into a Rajasthan courtroom and sits in the judge's chair for 45 minutes" },
          { letter:"C", text:"Herd of goats breaks into a Pune school and devours the entire batch of exam papers" },
        ],
        answer: "A",
        trivia: "A goat called Babli and her owner were arrested in 2016 after the animal ate the flowers and vegetables in the garden of their neighbour — who happened to be a judge. Both were later released on bail. (Ranker)",
      },
      {
        id: 3, round: 1,
        options: [
          { letter:"A", text:"Pet crow trained to shout \"bribe\" is seized during a police corruption raid in Chennai" },
          { letter:"B", text:"Parrot in Hyderabad memorises its owner's ATM PIN and helps thieves drain the account" },
          { letter:"C", text:"Parrot detained by police after repeatedly shouting obscenities at an 85-year-old woman" },
        ],
        answer: "C",
        trivia: "Rajuran police detained a parrot after an 85-year-old woman filed a complaint saying the bird insulted her with foul language every time it saw her face. She had filed the same complaint three times over two years before officers finally stepped in. (Ranker)",
      },
      {
        id: 4, round: 1,
        options: [
          { letter:"A", text:"Two-year-old in Kolkata issued a trespass fine after crawling onto a busy highway" },
          { letter:"B", text:"A 3-year-old girl in India put on a police charge sheet for armed robbery after a neighbour dispute" },
          { letter:"C", text:"Five-year-old boy summoned to court in Jaipur for allegedly stealing mangoes from a government tree" },
        ],
        answer: "B",
        trivia: "A neighbour dispute in India escalated when one family called the police on the other — naming the other family's 3-year-old girl as the armed robber. Officers only realised they'd been tricked after arriving and harassing the family. Bizarrely, it wasn't even the first time the toddler had been accused of the same crime. (Ranker)",
      },
      // ── ROUND 2 ──────────────────────────────────────────────────────────
      {
        id: 5, round: 2,
        options: [
          { letter:"A", text:"Bihar man files a police complaint claiming a stray dog stole 400,000 rupees from him" },
          { letter:"B", text:"Monkey snatches a tourist's wallet in Agra and drops it into a temple donation box" },
          { letter:"C", text:"Man in Uttar Pradesh takes his neighbour to court after their cat eats his prize koi fish" },
        ],
        answer: "A",
        trivia: "A man in Bihar lodged a formal police complaint claiming a stray dog had stolen 400,000 rupees (roughly $7,400) from him. Officers were sceptical but registered the complaint. No word on whether the dog was ever charged. (Ranker)",
      },
      {
        id: 6, round: 2,
        options: [
          { letter:"A", text:"Mumbai man breaks a record for most government forms stamped in one minute using only his chin" },
          { letter:"B", text:"Indian man sets a Guinness World Record for the fastest nose-typing speed on a mobile phone" },
          { letter:"C", text:"Kolkata student completes her entire university exam paper writing with her left foot, claiming a record" },
        ],
        answer: "B",
        trivia: "An Indian man trained for years to type at speed using only his nose, eventually breaking the Guinness World Record. Notably, the artist who inspired him — Ani K. from Kerala — had already given up nose-painting the moment he discovered a rival nose-painter existed. (Ranker)",
      },
      {
        id: 7, round: 2,
        options: [
          { letter:"A", text:"Bengaluru installs a singing mannequin on a motorbike at traffic lights to slow down speeders" },
          { letter:"B", text:"Village in Uttar Pradesh props a scarecrow in a police uniform outside the town's only ATM" },
          { letter:"C", text:"A life-size cardboard cutout of a police officer is placed at a busy junction to deter traffic violations" },
        ],
        answer: "C",
        trivia: "Traffic authorities placed a life-size cardboard cutout of a police officer at a notoriously chaotic Indian intersection. It reportedly worked — drivers slowed down and obeyed signals when they spotted the cardboard cop. (Ranker / Indian traffic news)",
      },
      {
        id: 8, round: 2,
        options: [
          { letter:"A", text:"Passenger arrested at Indian airport after customs found he had swallowed gold bars" },
          { letter:"B", text:"Traveller caught at Mumbai airport with 47 SIM cards hidden inside a block of ghee" },
          { letter:"C", text:"Man apprehended at Delhi airport with live fish taped inside a false-bottom tiffin box" },
        ],
        answer: "A",
        trivia: "Customs officials at an Indian airport detected gold bars inside a passenger's stomach using an X-ray scanner. The man had swallowed them to avoid detection and had to wait under supervision for the evidence to, eventually, emerge. (Ranker / Indian customs reports)",
      },
      // ── ROUND 3 ──────────────────────────────────────────────────────────
      {
        id: 9, round: 3,
        options: [
          { letter:"A", text:"Mumbai startup launches an AI tool that scores a groom's dancing ability before the wedding is approved" },
          { letter:"B", text:"India's booming pre-marital detective agencies now specialise in investigating the future mother-in-law" },
          { letter:"C", text:"Delhi matchmaking service lets families hire a professional lie detector operator for first meetings" },
        ],
        answer: "B",
        trivia: "India's pre-marital detective industry has exploded, initially hired to investigate the finances and romantic histories of brides and grooms. A newer trend has agencies investigating the character of the prospective mother-in-law — reportedly the most requested service of all. (Ranker)",
      },
      {
        id: 10, round: 3,
        options: [
          { letter:"A", text:"Retired postman in Nagpur writes personalised wedding invitations using only his little toe, with 200 regular clients" },
          { letter:"B", text:"Man in Hyderabad carves vegetable portraits using only his eyebrows, exhibited at a state art fair" },
          { letter:"C", text:"Artist from Kerala paints detailed celebrity portraits using only his tongue as a paintbrush" },
        ],
        answer: "C",
        trivia: "Ani K. from Kerala paints strikingly detailed portraits using his tongue as a brush. He originally set records using his nose — but abandoned it the moment he discovered another nose-painter existed, saying \"I'm always trying to do something different.\" (Ranker)",
      },
      {
        id: 11, round: 3,
        options: [
          { letter:"A", text:"Nearly 600 students expelled in Bihar after parents scaled school walls to pass cheat sheets through exam room windows" },
          { letter:"B", text:"School in Gujarat cancels all exams after question papers were posted to a WhatsApp group by the printing company" },
          { letter:"C", text:"Students in Rajasthan hire professional lip-readers to decode invigilators' whispered answers during tests" },
        ],
        answer: "A",
        trivia: "In Patna, Bihar, images went viral showing parents clinging to the outer walls of a school building, passing rolled-up cheat sheets through windows to their children sitting exams inside. Nearly 600 students were expelled and the state's education system faced national scandal. (Ranker)",
      },
      {
        id: 12, round: 3,
        options: [
          { letter:"A", text:"Groom in Surat arrives at his own wedding wearing a suit stitched entirely from Rs 10 currency notes" },
          { letter:"B", text:"Indian man spends over Rs 1 crore on a shirt made of solid gold to attract women" },
          { letter:"C", text:"Jaipur jeweller commissions a turban studded with 5,000 diamonds to wear at a national beauty pageant" },
        ],
        answer: "B",
        trivia: "Datta Phuge from Pune spent Rs 1.26 crore (around $22,000) on a shirt woven from 3.3 kg of solid gold thread. He wore it specifically to attract female attention, saying gold was the only thing he needed to impress. Fifteen goldsmiths worked for two weeks to make it. (Ranker / multiple outlets)",
      },
    ];

    // ─────────────────────────────────────────────────────────────────────────
    // CONSTANTS
    // ─────────────────────────────────────────────────────────────────────────
    const COLORS = [
      { bg:"bg-blue-600",    border:"border-blue-500",    text:"text-blue-300",    badge:"bg-blue-900/60"    },
      { bg:"bg-rose-600",    border:"border-rose-500",    text:"text-rose-300",    badge:"bg-rose-900/60"    },
      { bg:"bg-emerald-600", border:"border-emerald-500", text:"text-emerald-300", badge:"bg-emerald-900/60" },
      { bg:"bg-amber-500",   border:"border-amber-500",   text:"text-amber-300",   badge:"bg-amber-900/60"   },
      { bg:"bg-purple-600",  border:"border-purple-500",  text:"text-purple-300",  badge:"bg-purple-900/60"  },
      { bg:"bg-pink-600",    border:"border-pink-500",    text:"text-pink-300",    badge:"bg-pink-900/60"    },
    ];

    // ─────────────────────────────────────────────────────────────────────────
    // STORAGE  (QM writes, Player reads via storage event)
    // ─────────────────────────────────────────────────────────────────────────
    const STORE_KEY = 'gth_india_v1';

    const INITIAL_STATE = {
      gamePhase:      'setup',   // setup | dashboard | question | final
      teams:          ['Team 1','Team 2','Team 3','Team 4'],
      scores:         [0,0,0,0],
      questionStates: {},        // { [id]: 'done' }
      activeQuestion: null,
      activeTeamIdx:  0,
      activePhase:    'guess',   // guess | second_chance | reveal
      selectedFirst:  null,
      selectedSecond: null,
      pointsAwarded:  null,
    };

    const saveState = s => localStorage.setItem(STORE_KEY, JSON.stringify({ ...s, _ts: Date.now() }));
    const loadState = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)); } catch { return null; } };

    // ─────────────────────────────────────────────────────────────────────────
    // MODE DETECTION — add ?player to URL to open the player screen
    // ─────────────────────────────────────────────────────────────────────────
    const IS_PLAYER = new URLSearchParams(window.location.search).has('player');

    // ═════════════════════════════════════════════════════════════════════════
    //  QM SCREENS
    // ═════════════════════════════════════════════════════════════════════════

    // ── QM Setup ─────────────────────────────────────────────────────────────
    function QMSetup({ initialTeams, onStart }) {
      const [numTeams, setNumTeams] = useState(initialTeams.length || 4);
      const [names, setNames] = useState([
        ...initialTeams,
        'Team 5', 'Team 6'
      ].slice(0, 6));

      const updateName = (i, v) => { const n=[...names]; n[i]=v; setNames(n); };

      return (
        <div className="min-h-screen bg-gray-950 flex items-center justify-center p-6">
          <div className="w-full max-w-lg fade-in">
            <div className="text-center mb-8">
              <div className="text-7xl mb-3">🇮🇳</div>
              <h1 className="text-5xl font-black text-white">Guess the Headlines</h1>
              <p className="text-gray-500 mt-2 text-lg">India Edition · Quiz Master Setup</p>
            </div>
            <div className="bg-gray-900 rounded-2xl p-6 border border-gray-800 shadow-2xl">

              <div className="mb-6">
                <label className="text-gray-400 text-xs font-bold uppercase tracking-widest block mb-3">Number of Teams</label>
                <div className="flex gap-2">
                  {[2,3,4,5,6].map(n => (
                    <button key={n} onClick={() => setNumTeams(n)}
                      className={`w-12 h-12 rounded-xl font-bold text-lg transition-all ${
                        numTeams===n ? 'bg-indigo-600 text-white ring-2 ring-indigo-400 ring-offset-2 ring-offset-gray-900 scale-105'
                        : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'}`}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>

              <div className="mb-6">
                <label className="text-gray-400 text-xs font-bold uppercase tracking-widest block mb-3">Team Names</label>
                <div className="space-y-2">
                  {Array.from({length:numTeams}).map((_,i) => (
                    <div key={i} className="flex items-center gap-3">
                      <span className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black text-white flex-shrink-0 ${COLORS[i].bg}`}>{i+1}</span>
                      <input value={names[i]} onChange={e => updateName(i,e.target.value)}
                        className="flex-1 bg-gray-800 text-white rounded-lg px-4 py-2.5 border border-gray-700 focus:outline-none focus:border-indigo-500 transition-colors"
                        placeholder={`Team ${i+1}`} />
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-gray-800/60 border border-gray-700 rounded-xl p-3 mb-5 text-xs text-gray-400">
                💡 <strong className="text-gray-200">Scoring:</strong>{" "}
                1st correct = <span className="text-emerald-400 font-bold">20 pts</span> ·{" "}
                2nd correct = <span className="text-yellow-400 font-bold">10 pts</span> ·{" "}
                both wrong = <span className="text-red-400 font-bold">0 pts</span>
              </div>

              <button onClick={() => onStart(numTeams, names)}
                className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl text-lg transition-all active:scale-[0.98]">
                Start Game 🎉
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── QM Dashboard ─────────────────────────────────────────────────────────
    function QMDashboard({ state, onSelectQuestion, onFinal }) {
      const { teams, scores, questionStates } = state;
      const totalQ = ALL_QUESTIONS.length;
      const doneQ  = Object.values(questionStates).filter(v => v==='done').length;
      const playerUrl = window.location.href.split('?')[0] + '?player';

      return (
        <div className="min-h-screen bg-gray-950 p-5 fade-in">
          <div className="max-w-5xl mx-auto">

            {/* Header */}
            <div className="flex items-center justify-between mb-5">
              <div>
                <h1 className="text-xl font-black text-white">📰 Guess the Headlines</h1>
                <p className="text-gray-600 text-xs font-mono mt-0.5">🔑 Quiz Master · {doneQ}/{totalQ} played</p>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => window.open(playerUrl,'_blank')}
                  className="flex items-center gap-2 bg-indigo-900/50 hover:bg-indigo-800/70 border border-indigo-700 text-indigo-300 text-sm px-3 py-2 rounded-lg transition-all font-semibold">
                  🖥 Open Player Screen
                </button>
                <button onClick={onFinal}
                  className="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 text-sm px-3 py-2 rounded-lg transition-all">
                  🏆 Final Scores
                </button>
              </div>
            </div>

            {/* Scoreboard */}
            <div className={`grid gap-3 mb-5 ${teams.length<=4?'grid-cols-4':'grid-cols-6'}`}>
              {teams.map((t,i) => (
                <div key={i} className={`bg-gray-900 rounded-xl p-3 border-2 ${COLORS[i].border}`}>
                  <div className={`text-xs font-bold uppercase tracking-wider truncate mb-1 ${COLORS[i].text}`}>{t}</div>
                  <div className="text-3xl font-black text-white leading-none">{scores[i]}</div>
                  <div className="text-gray-600 text-xs mt-0.5">pts</div>
                </div>
              ))}
            </div>

            {/* Progress */}
            <div className="mb-5">
              <div className="flex justify-between text-xs text-gray-700 mb-1 font-mono">
                <span>Progress</span><span>{doneQ}/{totalQ}</span>
              </div>
              <div className="h-1 bg-gray-800 rounded-full overflow-hidden">
                <div className="h-full bg-indigo-600 rounded-full transition-all duration-500" style={{width:`${(doneQ/totalQ)*100}%`}} />
              </div>
            </div>

            {/* Questions by round */}
            <div className="space-y-5">
              {[1,2,3].map(round => {
                const rqs = ALL_QUESTIONS.filter(q => q.round===round);
                return (
                  <div key={round}>
                    <div className="text-gray-500 text-xs font-bold uppercase tracking-widest mb-2">Round {round}</div>
                    <div className="grid grid-cols-2 gap-2">
                      {rqs.map(q => {
                        const qi = ALL_QUESTIONS.indexOf(q);
                        const teamIdx = qi % teams.length;
                        const isDone = questionStates[q.id]==='done';
                        return (
                          <button key={q.id} onClick={() => !isDone && onSelectQuestion(q,teamIdx)} disabled={isDone}
                            className={`text-left rounded-xl p-3.5 border-2 transition-all ${isDone
                              ? 'bg-gray-900/30 border-gray-800 opacity-40 cursor-not-allowed'
                              : 'bg-gray-900 border-gray-700 hover:border-indigo-500 hover:bg-gray-800 cursor-pointer active:scale-[0.98]'}`}>
                            <div className="flex justify-between items-center mb-2">
                              <span className="text-gray-600 text-xs font-mono font-bold">Q{q.id}</span>
                              <div className="flex items-center gap-1.5">
                                <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${COLORS[teamIdx].badge} ${COLORS[teamIdx].text}`}>{teams[teamIdx]}</span>
                                {isDone && <span className="text-emerald-400 text-xs font-bold">✓</span>}
                              </div>
                            </div>
                            {q.options.map(o => (
                              <p key={o.letter} className="text-gray-500 text-xs flex gap-1.5 leading-snug">
                                <span className="text-gray-600 font-bold flex-shrink-0">{o.letter}.</span>
                                <span className="line-clamp-1">{o.text}</span>
                              </p>
                            ))}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

          </div>
        </div>
      );
    }

    // ── QM Active Question ────────────────────────────────────────────────────
    function QMQuestion({ state, update, onDone }) {
      const { activeQuestion:q, activeTeamIdx, activePhase, selectedFirst, selectedSecond, pointsAwarded, teams, scores } = state;
      const teamColor = COLORS[activeTeamIdx];

      const handleGuess = (letter) => {
        if (activePhase==='guess') {
          if (letter===q.answer) {
            const s=[...scores]; s[activeTeamIdx]+=20;
            update({ activePhase:'reveal', selectedFirst:letter, pointsAwarded:20, scores:s });
          } else {
            update({ activePhase:'second_chance', selectedFirst:letter });
          }
        } else if (activePhase==='second_chance') {
          const pts = letter===q.answer ? 10 : 0;
          const s=[...scores]; s[activeTeamIdx]+=pts;
          update({ activePhase:'reveal', selectedSecond:letter, pointsAwarded:pts, scores:s });
        }
      };

      const isReveal = activePhase==='reveal';

      return (
        <div className="min-h-screen bg-gray-950 flex flex-col fade-in">

          {/* Top bar */}
          <div className="flex items-center justify-between px-5 py-3 bg-gray-900 border-b border-gray-800">
            <button onClick={onDone} className="text-gray-500 hover:text-gray-200 text-sm transition-colors flex items-center gap-1.5">
              ← Dashboard
            </button>
            <div className="flex items-center gap-2">
              <span className="text-gray-600 font-mono text-xs">Round {q.round} · Q{q.id}</span>
              <span className={`text-sm font-bold px-3 py-1 rounded-full ${teamColor.badge} ${teamColor.text}`}>{teams[activeTeamIdx]}'s Turn</span>
            </div>
            <div className={`text-xs font-bold px-3 py-1.5 rounded-lg border ${
              activePhase==='guess'         ? 'bg-indigo-950/60 border-indigo-700 text-indigo-300' :
              activePhase==='second_chance' ? 'bg-amber-950/60 border-amber-700 text-amber-300' :
              pointsAwarded>0               ? 'bg-emerald-950/60 border-emerald-700 text-emerald-300'
                                            : 'bg-gray-900 border-gray-700 text-gray-500'}`}>
              {activePhase==='guess'         ? 'Attempt 1 · 20 pts' :
               activePhase==='second_chance' ? 'Attempt 2 · 10 pts' :
               pointsAwarded>0 ? `+${pointsAwarded} pts awarded` : 'No points'}
            </div>
          </div>

          {/* Body: two columns */}
          <div className="flex-1 flex flex-col lg:flex-row min-h-0">

            {/* LEFT — options with answer key visible */}
            <div className="flex-1 p-5 lg:border-r border-gray-800 overflow-auto">
              <div className="text-gray-600 text-xs font-bold uppercase tracking-widest mb-3">Question options <span className="text-emerald-600">(🔑 = correct answer)</span></div>
              <div className="space-y-2.5">
                {q.options.map(opt => {
                  const isCorrect   = opt.letter===q.answer;
                  const wasBad1     = selectedFirst===opt.letter && !isCorrect;
                  const wasBad2     = selectedSecond===opt.letter && !isCorrect;
                  let cls = 'bg-gray-900 border-gray-700 text-gray-300';
                  let letterCls = 'text-gray-600';
                  let trailingIcon = null;
                  if (isCorrect) { cls='bg-emerald-950/60 border-emerald-700 text-white'; letterCls='text-emerald-400'; }
                  if (isReveal) {
                    if (wasBad1||wasBad2) { cls='bg-red-950/40 border-red-800 text-gray-500'; trailingIcon='❌'; }
                    if (isCorrect) trailingIcon='✅';
                    if (!isCorrect&&!wasBad1&&!wasBad2) { cls='bg-gray-900/40 border-gray-800 text-gray-600'; }
                  }
                  return (
                    <div key={opt.letter} className={`rounded-xl p-4 border-2 flex items-start gap-3 ${cls}`}>
                      <span className={`text-xl font-black flex-shrink-0 leading-tight ${letterCls}`}>{opt.letter}</span>
                      <span className="flex-1 text-sm leading-relaxed">{opt.text}</span>
                      {isCorrect && !isReveal && <span className="text-emerald-400 text-lg flex-shrink-0">🔑</span>}
                      {isReveal && trailingIcon && <span className="text-xl flex-shrink-0">{trailingIcon}</span>}
                    </div>
                  );
                })}
              </div>

              {/* Trivia preview for QM */}
              {isReveal && (
                <div className="mt-4 bg-indigo-950/50 border border-indigo-800 rounded-xl p-4 fade-in">
                  <div className="text-indigo-400 text-xs font-bold uppercase tracking-wider mb-1.5">Trivia (now visible on player screen)</div>
                  <p className="text-gray-300 text-sm leading-relaxed">{q.trivia}</p>
                </div>
              )}
            </div>

            {/* RIGHT — QM controls */}
            <div className="w-full lg:w-72 p-5 flex flex-col gap-4">
              {!isReveal ? (
                <div>
                  <div className="text-gray-500 text-xs font-bold uppercase tracking-widest mb-3">
                    {activePhase==='guess' ? "Record team's 1st guess:" : "Record team's 2nd guess:"}
                  </div>
                  {activePhase==='second_chance' && (
                    <div className="bg-red-950/50 border border-red-800 rounded-xl p-2.5 mb-3 text-center">
                      <span className="text-red-300 text-sm font-semibold">✗ Wrong! One more chance.</span>
                    </div>
                  )}
                  <div className="space-y-2.5">
                    {q.options.map(opt => {
                      const disabled = activePhase==='second_chance' && opt.letter===selectedFirst;
                      return (
                        <button key={opt.letter}
                          onClick={() => !disabled && handleGuess(opt.letter)}
                          disabled={disabled}
                          className={`w-full py-4 rounded-xl font-black text-2xl transition-all border-2 ${disabled
                            ? 'bg-gray-900/40 text-gray-700 cursor-not-allowed border-gray-800'
                            : 'bg-gray-800 hover:bg-indigo-700 text-white border-gray-700 hover:border-indigo-500 active:scale-[0.97]'}`}>
                          {disabled ? `${opt.letter}  ✗` : `Team said  ${opt.letter}`}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div>
                  <div className={`rounded-2xl p-5 text-center mb-4 pop-in ${
                    pointsAwarded>0 ? 'bg-emerald-950/70 border-2 border-emerald-700' : 'bg-gray-900 border-2 border-gray-700'}`}>
                    <div className="text-5xl mb-2">
                      {pointsAwarded===20?'🎉': pointsAwarded===10?'✅':'❌'}
                    </div>
                    <div className={`text-3xl font-black ${pointsAwarded>0?'text-emerald-300':'text-gray-500'}`}>
                      {pointsAwarded>0 ? `+${pointsAwarded} pts` : '0 pts'}
                    </div>
                    <div className="text-gray-500 text-sm mt-1">
                      {pointsAwarded===20?'Correct first time!': pointsAwarded===10?'Got it on attempt 2':'Both guesses wrong'}
                    </div>
                  </div>
                  <button onClick={onDone}
                    className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.97]">
                    Next Question →
                  </button>
                </div>
              )}
            </div>

          </div>
        </div>
      );
    }

    // ── QM Final ─────────────────────────────────────────────────────────────
    function QMFinal({ state, onRestart }) {
      const { teams, scores } = state;
      const ranked = teams.map((n,i)=>({n,s:scores[i],i})).sort((a,b)=>b.s-a.s);
      const medals = ['🥇','🥈','🥉'];
      return (
        <div className="min-h-screen bg-gray-950 flex items-center justify-center p-6 fade-in">
          <div className="w-full max-w-md">
            <div className="text-center mb-7">
              <div className="text-7xl mb-3">🏆</div>
              <h1 className="text-4xl font-black text-white">Final Scores</h1>
              <p className="text-gray-600 mt-1 text-sm">🔑 Quiz Master view</p>
            </div>
            <div className="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden mb-5">
              {ranked.map(({n,s,i},pos) => (
                <div key={n} className={`flex items-center gap-4 px-5 py-4 ${pos<ranked.length-1?'border-b border-gray-800':''} ${pos===0?'bg-yellow-950/40':''}`}>
                  <span className="text-2xl w-8 text-center">{medals[pos]||`#${pos+1}`}</span>
                  <span className={`flex-1 font-bold text-lg ${pos===0?'text-yellow-300':'text-white'}`}>{n}</span>
                  <span className={`text-4xl font-black ${pos===0?'text-yellow-300':'text-white'}`}>{s}</span>
                  <span className="text-gray-600 text-sm">pts</span>
                </div>
              ))}
            </div>
            <button onClick={onRestart}
              className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl text-lg transition-all active:scale-[0.98]">
              Play Again 🔄
            </button>
          </div>
        </div>
      );
    }

    // ── QM App root ───────────────────────────────────────────────────────────
    function QMApp() {
      const [state, setState] = useState(() => loadState() || INITIAL_STATE);

      const update = useCallback(patch => {
        setState(s => {
          const next = { ...s, ...patch };
          saveState(next);
          return next;
        });
      }, []);

      const { gamePhase } = state;

      if (gamePhase==='setup') {
        return <QMSetup initialTeams={state.teams} onStart={(num,names) => update({
          gamePhase:      'dashboard',
          teams:          names.slice(0,num),
          scores:         Array(num).fill(0),
          questionStates: {},
          activeQuestion: null,
        })} />;
      }

      if (gamePhase==='question') {
        return <QMQuestion state={state} update={update} onDone={() => {
          const qs = { ...state.questionStates, [state.activeQuestion.id]:'done' };
          update({ gamePhase:'dashboard', activeQuestion:null, questionStates:qs });
        }} />;
      }

      if (gamePhase==='final') {
        return <QMFinal state={state} onRestart={() => {
          const reset = { ...INITIAL_STATE };
          saveState(reset);
          setState(reset);
        }} />;
      }

      return <QMDashboard state={state}
        onSelectQuestion={(q,teamIdx) => update({
          gamePhase:     'question',
          activeQuestion: q,
          activeTeamIdx:  teamIdx,
          activePhase:   'guess',
          selectedFirst:  null,
          selectedSecond: null,
          pointsAwarded:  null,
        })}
        onFinal={() => update({ gamePhase:'final' })}
      />;
    }

    // ═════════════════════════════════════════════════════════════════════════
    //  PLAYER SCREENS
    // ═════════════════════════════════════════════════════════════════════════

    // ── Player: Waiting / Scoreboard ─────────────────────────────────────────
    function PlayerWaiting({ teams, scores }) {
      return (
        <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center p-8 fade-in">
          <div className="text-8xl mb-5">🇮🇳</div>
          <h1 className="text-6xl font-black text-white mb-2 text-center">Guess the Headlines</h1>
          <p className="text-gray-500 text-2xl mb-12">India Edition</p>

          {teams.length>0 && (
            <div className="flex flex-wrap justify-center gap-5 mb-14">
              {teams.map((t,i) => (
                <div key={i} className={`bg-gray-900 rounded-2xl p-6 border-2 ${COLORS[i].border} text-center min-w-[140px]`}>
                  <div className={`text-sm font-bold uppercase tracking-wider mb-2 ${COLORS[i].text}`}>{t}</div>
                  <div className="text-6xl font-black text-white">{scores[i]}</div>
                  <div className="text-gray-600 mt-1">pts</div>
                </div>
              ))}
            </div>
          )}

          <div className="flex items-center gap-3 text-gray-600">
            <span className="w-3 h-3 bg-indigo-500 rounded-full pulse-dot inline-block"></span>
            <span className="text-xl">Waiting for next question…</span>
          </div>
        </div>
      );
    }

    // ── Player: Active Question ───────────────────────────────────────────────
    function PlayerQuestion({ state }) {
      const { activeQuestion:q, activeTeamIdx, activePhase, selectedFirst, selectedSecond, pointsAwarded, teams } = state;
      if (!q) return null;

      const teamColor = COLORS[activeTeamIdx];
      const isReveal  = activePhase==='reveal';

      return (
        <div className="min-h-screen bg-gray-950 flex flex-col fade-in">

          {/* Top bar */}
          <div className="flex items-center justify-between px-6 py-3 bg-gray-900/80 border-b border-gray-800">
            <span className="text-gray-600 font-mono text-sm">Round {q.round} · Q{q.id}</span>
            <span className={`text-xl font-black px-6 py-1.5 rounded-full ${teamColor.badge} ${teamColor.text}`}>
              {teams[activeTeamIdx]}'s Turn
            </span>
            <span className={`text-sm font-bold px-4 py-1.5 rounded-lg border ${
              activePhase==='guess'         ? 'bg-indigo-950/60 border-indigo-700 text-indigo-300' :
              activePhase==='second_chance' ? 'bg-amber-950/60 border-amber-700 text-amber-300' :
              pointsAwarded>0               ? 'bg-emerald-950/60 border-emerald-700 text-emerald-300'
                                            : 'bg-gray-900 border-gray-700 text-gray-500'}`}>
              {activePhase==='guess'         ? '🎯 Attempt 1 · 20 pts' :
               activePhase==='second_chance' ? '⚡ Attempt 2 · 10 pts' :
               pointsAwarded>0 ? `🎉 +${pointsAwarded} pts!` : '❌ 0 pts'}
            </span>
          </div>

          {/* Phase headline */}
          <div className="text-center py-7 px-6">
            {activePhase==='guess' && (
              <h2 className="text-5xl font-black text-white">Which headline is REAL?</h2>
            )}
            {activePhase==='second_chance' && (
              <div>
                <div className="text-red-400 text-2xl font-bold mb-1">Wrong guess!</div>
                <h2 className="text-5xl font-black text-white">One more try…</h2>
              </div>
            )}
            {isReveal && (
              <h2 className={`text-5xl font-black ${pointsAwarded>0?'text-emerald-300':'text-gray-500'}`}>
                {pointsAwarded===20 ? '🎉 Correct first time!' :
                 pointsAwarded===10 ? '✅ Got it on the second try!' :
                                      '❌ Unlucky!'}
              </h2>
            )}
          </div>

          {/* Options */}
          <div className="flex-1 px-6 pb-4">
            <div className="max-w-4xl mx-auto space-y-4">
              {q.options.map(opt => {
                const isCorrect = opt.letter===q.answer;
                const wasBad1   = selectedFirst===opt.letter && !isCorrect;
                const wasBad2   = selectedSecond===opt.letter && !isCorrect;
                let cardCls   = 'bg-gray-900 border-gray-700 text-white';
                let letterCls = 'text-gray-400';
                let icon      = null;

                if (isReveal) {
                  if (isCorrect) { cardCls='bg-emerald-950/80 border-emerald-500 text-white'; letterCls='text-emerald-400'; icon='✅'; }
                  else if (wasBad1||wasBad2) { cardCls='bg-red-950/50 border-red-700 text-gray-500'; letterCls='text-red-400'; icon='❌'; }
                  else { cardCls='bg-gray-900/40 border-gray-800 text-gray-600'; }
                } else if (activePhase==='second_chance' && opt.letter===selectedFirst) {
                  cardCls='bg-red-950/30 border-red-800 text-gray-600'; letterCls='text-red-500'; icon='✗';
                }

                return (
                  <div key={opt.letter} className={`rounded-2xl p-5 border-2 flex items-start gap-4 transition-all ${cardCls}`}>
                    <span className={`text-4xl font-black flex-shrink-0 leading-tight ${letterCls}`}>{opt.letter}</span>
                    <span className="text-2xl leading-snug flex-1">{opt.text}</span>
                    {icon && <span className="text-3xl flex-shrink-0 self-center">{icon}</span>}
                  </div>
                );
              })}
            </div>

            {/* Trivia — only on reveal */}
            {isReveal && (
              <div className="max-w-4xl mx-auto mt-5 bg-indigo-950/60 border border-indigo-800 rounded-2xl p-5 pop-in">
                <div className="flex items-start gap-4">
                  <span className="text-3xl flex-shrink-0">📖</span>
                  <div>
                    <div className="text-indigo-300 font-bold text-sm uppercase tracking-wider mb-2">The Real Story</div>
                    <p className="text-gray-200 text-xl leading-relaxed">{q.trivia}</p>
                  </div>
                </div>
              </div>
            )}
          </div>

        </div>
      );
    }

    // ── Player: Final Scores ──────────────────────────────────────────────────
    function PlayerFinal({ teams, scores }) {
      const ranked = teams.map((n,i)=>({n,s:scores[i],i})).sort((a,b)=>b.s-a.s);
      const medals = ['🥇','🥈','🥉'];
      return (
        <div className="min-h-screen bg-gray-950 flex items-center justify-center p-6 fade-in">
          <div className="w-full max-w-lg text-center">
            <div className="text-9xl mb-5">🏆</div>
            <h1 className="text-7xl font-black text-white mb-10">Final Scores</h1>
            <div className="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
              {ranked.map(({n,s,i},pos) => (
                <div key={n} className={`flex items-center gap-5 px-6 py-5 ${pos<ranked.length-1?'border-b border-gray-800':''} ${pos===0?'bg-yellow-950/40':''}`}>
                  <span className="text-5xl w-14 text-center">{medals[pos]||`#${pos+1}`}</span>
                  <span className={`flex-1 text-3xl font-bold text-left ${pos===0?'text-yellow-300':'text-white'}`}>{n}</span>
                  <span className={`text-6xl font-black ${pos===0?'text-yellow-300':'text-white'}`}>{s}</span>
                  <span className="text-gray-600 text-xl">pts</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Player App root ───────────────────────────────────────────────────────
    function PlayerApp() {
      const [state, setState] = useState(() => loadState() || INITIAL_STATE);

      useEffect(() => {
        // Sync updates from QM tab via storage events
        const handler = e => {
          if (e.key===STORE_KEY && e.newValue) {
            try { setState(JSON.parse(e.newValue)); } catch {}
          }
        };
        window.addEventListener('storage', handler);
        return () => window.removeEventListener('storage', handler);
      }, []);

      const { gamePhase, teams, scores } = state;

      if (gamePhase==='question') return <PlayerQuestion state={state} />;
      if (gamePhase==='final')    return <PlayerFinal teams={teams} scores={scores} />;
      return <PlayerWaiting teams={teams} scores={scores} />;
    }

    // ═════════════════════════════════════════════════════════════════════════
    //  ROOT
    // ═════════════════════════════════════════════════════════════════════════
    ReactDOM.createRoot(document.getElementById('root')).render(
      IS_PLAYER ? <PlayerApp /> : <QMApp />
    );
  </script>
</body>
</html>
